<svg width="14" height="32" viewBox="0 0 14 32" xmlns="http://www.w3.org/2000/svg">
  <style>
    .cursor {
      animation: blink 1s steps(2, start) infinite;
    }
    @keyframes blink {
      to {
        visibility: hidden;
      }
    }
  </style>
  <rect class="cursor" x="2" y="2" width="6" height="28" fill="#38BDF8" />
</svg>
